<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" role="img" aria-labelledby="title desc" font-family="Inter, system-ui, sans-serif">
  <title id="title">Independent judge</title>
  <desc id="desc">After the proposers answer, an independent judge reconciles their answers. The judge is disjoint from the proposers (not one of the answering models), cross-family, and never scores its own answer. This removes self-preference bias. The judge reconciles into one decision but is not an oracle; it can still share a blind spot with the proposers.</desc>
  <rect width="820" height="280" fill="#0b1020"/>
  <g stroke="#2a3550" stroke-width="1.5" fill="#131a2b">
    <rect x="40" y="40" width="150" height="40" rx="9" stroke="#22d3ee"/>
    <rect x="40" y="96" width="150" height="40" rx="9" stroke="#22d3ee"/>
    <rect x="40" y="152" width="150" height="40" rx="9" stroke="#22d3ee"/>
    <rect x="330" y="86" width="170" height="100" rx="12" stroke="#a78bfa"/>
    <rect x="630" y="106" width="150" height="60" rx="10" stroke="#4ade80"/>
  </g>
  <g fill="#22d3ee" font-size="13" text-anchor="middle">
    <text x="115" y="65">Proposer answer 1</text><text x="115" y="121">Proposer answer 2</text><text x="115" y="177">Proposer answer 3</text>
  </g>
  <g text-anchor="middle">
    <text x="415" y="128" fill="#a78bfa" font-size="16">Judge</text>
    <text x="415" y="148" fill="#94a3b8" font-size="11">disjoint · cross-family</text>
    <text x="415" y="164" fill="#94a3b8" font-size="11">never scores its own</text>
    <text x="705" y="134" fill="#4ade80" font-size="13">Reconciled</text>
    <text x="705" y="151" fill="#4ade80" font-size="13">decision</text>
  </g>
  <g stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#a)">
    <path d="M190 60 L325 110"/><path d="M190 116 L325 136"/><path d="M190 172 L325 162"/><path d="M500 136 L625 136"/>
  </g>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#475569"/></marker></defs>
  <text x="410" y="248" fill="#94a3b8" font-size="12" text-anchor="middle">Independence removes self-preference bias — it does not make the judge correct.</text>
</svg>
