<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" role="img" aria-labelledby="title desc" font-family="Inter, system-ui, sans-serif">
  <title id="title">A model cannot verify itself; an independent party can</title>
  <desc id="desc">On the left, a single model verifying itself is a circular loop: the same weights produce both the answer and its self-assessment, so a confident wrong answer goes unchecked. On the right, an independent second party (a separate panel and cross-family judge) checks the answer, which reduces single-model error and surfaces disagreement. It is advisory, not a guarantee of correctness.</desc>
  <rect width="820" height="280" fill="#0b1020"/>
  <text x="200" y="36" fill="#f87171" font-size="14" text-anchor="middle">Self-verification (circular)</text>
  <text x="620" y="36" fill="#4ade80" font-size="14" text-anchor="middle">Independent verification</text>
  <line x1="410" y1="60" x2="410" y2="250" stroke="#2a3550" stroke-dasharray="4 4"/>
  <g stroke="#2a3550" stroke-width="1.5" fill="#131a2b">
    <rect x="130" y="110" width="140" height="60" rx="10" stroke="#f87171"/>
    <rect x="500" y="80" width="120" height="44" rx="9" stroke="#22d3ee"/>
    <rect x="500" y="150" width="120" height="44" rx="9" stroke="#a78bfa"/>
    <rect x="680" y="115" width="110" height="60" rx="10" stroke="#4ade80"/>
  </g>
  <g text-anchor="middle">
    <text x="200" y="145" fill="#f87171" font-size="13">One model</text>
    <text x="560" y="107" fill="#22d3ee" font-size="13">Answer</text>
    <text x="560" y="177" fill="#a78bfa" font-size="12">Independent judge</text>
    <text x="735" y="142" fill="#4ade80" font-size="12">Checked</text>
    <text x="735" y="158" fill="#4ade80" font-size="12">decision</text>
  </g>
  <path d="M270 130 C330 100 330 180 272 150" stroke="#f87171" stroke-width="1.5" fill="none" marker-end="url(#r)"/>
  <text x="200" y="200" fill="#94a3b8" font-size="11" text-anchor="middle">same weights grade their own work</text>
  <g stroke="#4ade80" stroke-width="1.5" fill="none" marker-end="url(#g)">
    <path d="M560 124 L560 146"/><path d="M620 172 L675 150"/>
  </g>
  <defs>
    <marker id="r" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#f87171"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#4ade80"/></marker>
  </defs>
  <text x="620" y="225" fill="#94a3b8" font-size="11" text-anchor="middle">advisory — reduces error, not a guarantee</text>
</svg>
