<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" role="img" aria-labelledby="title desc" font-family="Inter, system-ui, sans-serif">
  <title id="title">Grounding: Consensus times Ground Truth equals Decision Quality</title>
  <desc id="desc">Grounding feeds the real artifact (the actual diff, log, spec, or file) inline to every proposer and the judge, so they reason over the real source instead of their recollection. The governing equation is Consensus times Ground Truth equals Decision Quality. Grounding is the strongest lever on decision quality, stronger than adding more models. Today only inline context is live; large-file upload is dormant and the council does not fetch artifacts itself.</desc>
  <rect width="820" height="280" fill="#0b1020"/>
  <g fill="#e5e7eb" font-size="20" text-anchor="middle">
    <text x="170" y="58" fill="#22d3ee">Consensus</text>
    <text x="300" y="58" fill="#e5e7eb">×</text>
    <text x="470" y="58" fill="#4ade80">Ground Truth</text>
    <text x="640" y="58" fill="#e5e7eb">=</text>
    <text x="740" y="58" fill="#a78bfa">Quality</text>
  </g>
  <g stroke="#2a3550" stroke-width="1.5" fill="#131a2b">
    <rect x="40" y="110" width="170" height="70" rx="10" stroke="#4ade80"/>
    <rect x="330" y="92" width="150" height="36" rx="9" stroke="#22d3ee"/>
    <rect x="330" y="140" width="150" height="36" rx="9" stroke="#22d3ee"/>
    <rect x="330" y="188" width="150" height="36" rx="9" stroke="#a78bfa"/>
  </g>
  <g text-anchor="middle">
    <text x="125" y="140" fill="#4ade80" font-size="14">Real artifact</text>
    <text x="125" y="160" fill="#94a3b8" font-size="11">inline (live today)</text>
    <text x="405" y="115" fill="#22d3ee" font-size="13">Proposer</text>
    <text x="405" y="163" fill="#22d3ee" font-size="13">Proposer</text>
    <text x="405" y="211" fill="#a78bfa" font-size="13">Judge</text>
  </g>
  <g stroke="#4ade80" stroke-width="1.5" fill="none" marker-end="url(#a)">
    <path d="M210 130 L325 110"/><path d="M210 145 L325 158"/><path d="M210 160 L325 206"/>
  </g>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#4ade80"/></marker></defs>
  <text x="410" y="258" fill="#94a3b8" font-size="12" text-anchor="middle">Same source to every model. Upload is dormant; the council does not fetch artifacts itself.</text>
</svg>
