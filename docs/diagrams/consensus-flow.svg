<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" role="img" aria-labelledby="title desc" font-family="Inter, system-ui, sans-serif">
  <title id="title">Consensus synthesis modes</title>
  <desc id="desc">After the proposer fan-out, the synthesis mode decides what you get back. consensus returns one decided answer (default). diff returns an agreements and disagreements map where the judge compares but does not decide. raw returns every answer with no judge (cheapest). best_of returns the single strongest answer. full returns every answer plus the judge's per-model reasoning and a conclusion. There is no universally best mode; pick by intent.</desc>
  <rect width="820" height="320" fill="#0b1020"/>
  <g stroke="#2a3550" stroke-width="1.5" fill="#131a2b">
    <rect x="40" y="130" width="150" height="50" rx="10" stroke="#22d3ee"/>
    <rect x="320" y="20" width="220" height="44" rx="10" stroke="#a78bfa"/>
    <rect x="320" y="78" width="220" height="44" rx="10"/>
    <rect x="320" y="136" width="220" height="44" rx="10"/>
    <rect x="320" y="194" width="220" height="44" rx="10" stroke="#a78bfa"/>
    <rect x="320" y="252" width="220" height="44" rx="10" stroke="#a78bfa"/>
  </g>
  <g fill="#e5e7eb" font-size="13">
    <text x="115" y="160" text-anchor="middle" fill="#22d3ee">Proposer answers</text>
    <text x="335" y="40" fill="#a78bfa">consensus</text><text x="445" y="40" fill="#94a3b8" font-size="11">one decided answer (default)</text>
    <text x="335" y="98">diff</text><text x="372" y="98" fill="#94a3b8" font-size="11">agree/disagree map — judge compares, not decides</text>
    <text x="335" y="156">raw</text><text x="372" y="156" fill="#94a3b8" font-size="11">all answers, no judge (cheapest)</text>
    <text x="335" y="214" fill="#a78bfa">best_of</text><text x="425" y="214" fill="#94a3b8" font-size="11">single strongest answer</text>
    <text x="335" y="272" fill="#a78bfa">full</text><text x="372" y="272" fill="#94a3b8" font-size="11">all answers + judge reasoning + conclusion</text>
  </g>
  <g stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#a)">
    <path d="M190 150 L315 42"/><path d="M190 152 L315 100"/><path d="M190 155 L315 158"/><path d="M190 158 L315 216"/><path d="M190 160 L315 274"/>
  </g>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#475569"/></marker></defs>
  <text x="555" y="40" fill="#64748b" font-size="11">violet = judge involved</text>
</svg>
