<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" role="img" aria-labelledby="title desc" font-family="Inter, system-ui, sans-serif">
  <title id="title">Council consumes routing; it does not own it</title>
  <desc id="desc">Council expresses two routing needs: panel selection (a decorrelated cross-family panel) and data-residency routing (EU-hosted models for personal data). The Router component owns provider selection, failover, and capacity balancing. Council consumes routing the way a code-review tool consumes a CI runner; it does not implement provider failover or memory.</desc>
  <rect width="820" height="280" fill="#0b1020"/>
  <g stroke="#2a3550" stroke-width="1.5" fill="#131a2b">
    <rect x="40" y="90" width="180" height="100" rx="12" stroke="#a78bfa"/>
    <rect x="560" y="90" width="220" height="100" rx="12" stroke="#22d3ee"/>
  </g>
  <g text-anchor="middle">
    <text x="130" y="125" fill="#a78bfa" font-size="15">Council</text>
    <text x="130" y="147" fill="#94a3b8" font-size="11">decisions only</text>
    <text x="130" y="165" fill="#94a3b8" font-size="11">selection + residency</text>
    <text x="670" y="125" fill="#22d3ee" font-size="15">Router</text>
    <text x="670" y="147" fill="#94a3b8" font-size="11">provider selection</text>
    <text x="670" y="165" fill="#94a3b8" font-size="11">failover · capacity</text>
  </g>
  <g stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#a)">
    <path d="M220 130 H555"/>
  </g>
  <text x="388" y="122" fill="#94a3b8" font-size="12" text-anchor="middle">"I need a cross-family,</text>
  <text x="388" y="138" fill="#94a3b8" font-size="12" text-anchor="middle">EU-hosted panel"</text>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#475569"/></marker></defs>
  <text x="410" y="235" fill="#94a3b8" font-size="12" text-anchor="middle">Panel selection = decorrelation over score · EU-default for personal data</text>
  <text x="410" y="255" fill="#64748b" font-size="11" text-anchor="middle">Council does NOT implement failover, cost-routing, or memory.</text>
</svg>
